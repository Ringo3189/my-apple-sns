<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>リンゴ・タイムライン</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #eef2f3; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 600px; margin: 0 auto; }
        h1 { text-align: center; color: #ff4757; }
        .post-form { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        input, textarea { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        textarea { height: 80px; resize: none; }
        button { width: 100%; padding: 12px; background: #ff4757; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; }
        button:hover { background: #e04050; }
        .timeline { background: white; border-radius: 12px; padding: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .post { padding: 15px; border-bottom: 1px solid #eee; }
        .post:last-child { border-bottom: none; }
        .post-name { font-weight: bold; color: #555; font-size: 14px; margin-bottom: 5px; }
        .post-message { font-size: 16px; word-break: break-all; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍎 リンゴ・タイムライン</h1>
        
        <div class="post-form">
            <form action="/api/posts" method="POST">
                <input type="text" name="name" placeholder="ニックネーム" required>
                <textarea name="message" placeholder="いまどうしてる？" required></textarea>
                <button type="submit">投稿する</button>
            </form>
        </div>

        <div class="timeline" id="timeline">
            </div>
    </div>

    <script>
        // サーバーから投稿一覧を取ってきて画面に表示する
        async function loadPosts() {
            const response = await fetch('/api/posts');
            const posts = await response.json();
            const timeline = document.getElementById('timeline');
            
            timeline.innerHTML = posts.map(post => `
                <div class="post">
                    <div class="post-name">👤 ${escapeHTML(post.name)}</div>
                    <div class="post-message">${escapeHTML(post.message)}</div>
                </div>
            `).join('');
        }

        // 安全対策（文字化けや悪意ある書き込みの防止）
        function escapeHTML(str) {
            return str.replace(/[&<>"']/g, match => {
                const pairs = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' };
                return pairs[match];
            });
        }

        // ページが開いた時に投稿を読み込む
        loadPosts();
    </script>
</body>
</html>
